<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Staff Login</title>

<link
rel="stylesheet"
href="/css/output.css">

</head>

<body class="flex min-h-screen items-center justify-center bg-slate-100">

<div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-xl">

<h1 class="mb-2 text-center text-3xl font-bold">

Staff Login

</h1>

<p class="mb-8 text-center text-slate-500">

Restaurant Staff Access

</p>

<div class="space-y-5">

<input

id="username"

placeholder="Username"

class="w-full rounded-lg border p-3">

<input

id="password"

type="password"

placeholder="Password"

class="w-full rounded-lg border p-3">

<label class="flex items-center gap-2">

<input
id="rememberMe"
type="checkbox">

<span>

Remember Me

</span>

</label>

<button

id="loginBtn"

class="w-full rounded-lg bg-blue-600 py-3 font-semibold text-white hover:bg-blue-700">

Login

</button>

</div>

</div>

<script src="/js/api.js"></script>

<script src="/js/toast.js"></script>

<script src="/js/staffAuth.js"></script>

<script src="/js/staffLogin.js"></script>

</body>

</html>
