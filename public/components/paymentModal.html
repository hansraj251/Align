<div
    id="paymentModal"
    class="fixed inset-0 z-[9999] hidden bg-black/60"
>

    <div
    class="absolute inset-0 flex items-center justify-center p-4"
>

        <div
    class="flex h-[92vh] w-[95vw] max-w-6xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl"
>

        <!-- Header -->
        <div class="flex items-center justify-between border-b px-6 py-4">
            <h2 class="text-lg font-semibold">
                Payment
            </h2>

            <button
                id="closePaymentModal"
                class="text-gray-500 hover:text-gray-700"
            >
                ✕
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 space-y-6 overflow-y-auto p-6">

            <!-- Order Summary -->
            <div>
                <h3 class="mb-2 font-medium">
                    Order Summary
                </h3>

               <div
    id="paymentOrderSummary"
    class="space-y-2 rounded-lg border p-4 text-sm"
></div>
            </div>

            <!-- Discount -->
            <div>
                <h3 class="mb-2 font-medium">
                    Discount
                </h3>
                <div class="space-y-3">
    <div class="grid grid-cols-2 gap-3">

        <div>

            <label class="mb-1 block text-sm">
                Type
            </label>

            <select
                id="discountType"
                class="w-full rounded border p-2"
            >
                <option value="amount">
                    Amount
                </option>

                <option value="percentage">
                    Percentage (%)
                </option>

            </select>

        </div>

        <div>

            <label class="mb-1 block text-sm">
                Value
            </label>

            <input
                id="discountValue"
                type="number"
                min="0"
                value="0"
                class="w-full rounded border p-2"
            >

        </div>

    </div>

</div>

                <!-- Step 1 me sirf placeholder -->
            </div>

            <!-- Payment Method -->
            <div
    id="paymentMethodContainer"
    class="space-y-3"
>

    <h3 class="font-medium">
        Payment Method
    </h3>

    <select
        id="paymentMethod"
        class="w-full rounded border p-2"
    >
        <option value="cash">
            Cash
        </option>

        <option value="upi">
            UPI
        </option>

        <option value="card">
            Card
        </option>

        <option value="wallet">
            Wallet
        </option>

        <option value="bank">
            Bank Transfer
        </option>

        <option value="other">
            Other
        </option>

    </select>

</div>
<div>

    <label class="flex items-center gap-2">

        <input
            id="splitPayment"
            type="checkbox"
        >

        <span>
            Split Payment
        </span>

    </label>

</div>
<div
    id="splitPaymentContainer"
    class="hidden space-y-4 rounded-lg border p-4"
>

    <div
        id="splitPayments"
        class="space-y-3"
    >

    </div>

    <button
        id="addSplitPaymentBtn"
        type="button"
        class="rounded border px-3 py-2 text-sm"
    >
        + Add Payment Method
    </button>

    <div class="border-t pt-3 space-y-1 text-sm">

        <div class="flex justify-between">

            <span>Paid</span>

            <strong id="splitPaidAmount">
                0.00
            </strong>

        </div>

        <div class="flex justify-between">

            <span>Remaining</span>

            <strong id="splitRemainingAmount">
                0.00
            </strong>

        </div>

    </div>

</div>

            <!-- Notes -->
            <div>
                <label class="mb-1 block text-sm">
                    Notes
                </label>

                <textarea
                    id="paymentNotes"
                    rows="3"
                    class="w-full rounded border p-2"
                ></textarea>
            </div>

        </div>
        <div class="border-t bg-slate-50 p-5">

    <div
        id="paymentSummary"
        class="space-y-2 text-sm"
    ></div>

</div>

        <!-- Footer -->
        <div
    class="flex flex-wrap items-center justify-end gap-3 border-t bg-white px-6 py-5"
>

            <button
                id="cancelPaymentBtn"
                class="rounded border px-4 py-2"
            >
                Cancel
            </button>

            <button
                id="markPaidBtn"
                class="flex-1 rounded bg-green-600 px-4 py-3 text-white sm:flex-none"
            >
                Mark Paid
            </button>

            <button
                id="printBillBtn"
                class="rounded bg-blue-600 px-4 py-2 text-white"
            >
                Print Bill
            </button>

        </div>

    </div>
</div>
</div>
