<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Menu Items</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="h-screen overflow-hidden bg-slate-100">

<main class="flex h-screen flex-col bg-slate-100 p-8">
<div class="shrink-0">

    <div class="mb-3 flex items-center justify-between gap-6">

    <div class="flex items-center gap-3">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-5 py-3 font-medium text-white hover:bg-slate-800">

            ← Dashboard

        </a>

        <a
            href="/admin/categories.html"
            class="rounded-lg bg-indigo-600 px-5 py-3 font-medium text-white hover:bg-indigo-700">

            Categories

        </a>

        <a
            href="/admin/floor-management.html"
            class="rounded-lg bg-emerald-600 px-5 py-3 font-medium text-white hover:bg-emerald-700">

            Manage Areas

        </a>

        <input
            id="itemId"
            type="hidden">

        <button
            id="saveItemBtn"
            class="rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-700">

            Save Item

        </button>

        <button
            id="cancelEditBtn"
            class="hidden rounded-lg border border-slate-300 px-6 py-3 font-semibold hover:bg-slate-100">

            Cancel

        </button>

    </div>

    <input
        id="menuSearch"
        type="text"
        placeholder="Search menu items..."
        class="w-full max-w-md rounded-lg border border-slate-300 px-4 py-3">

</div>

</div>


        <div class="rounded-xl bg-white p-6 shadow">

    <div class="grid gap-4 xl:grid-cols-4">

        <div>

            <label class="mb-2 block font-medium">
                Category
            </label>

            <div class="relative">

    <input
        id="categorySearch"
        type="text"
        autocomplete="off"
        placeholder="Search category..."
        class="w-full rounded-lg border p-3">

    <input
        id="category"
        type="hidden">
    <input
    id="categoryType"
    type="hidden">    

    <div
        id="categoryResults"
        class="absolute left-0 right-0 top-full z-50 mt-1 hidden max-h-60 overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg">

    </div>

</div>

        </div>

        <div>

    <label class="mb-2 block font-medium">
        Item Name
    </label>

    <div class="relative">

        <input
            id="itemName"
            type="text"
            autocomplete="off"
            class="w-full rounded-lg border p-3"
            placeholder="Type item name...">

        <div
            id="itemSuggestions"
            class="absolute left-0 right-0 top-full z-50 mt-1 hidden max-h-64 overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg bg-white">

        </div>

    </div>

</div>

        <div>

            <label class="mb-2 block font-medium">
                Price
            </label>

            <input
                id="price"
                type="number"
                class="w-full rounded-lg border p-3"
                placeholder="Type item price...">

        </div>

        <div>

    <label class="mb-2 block font-medium">
        Food Type
    </label>

    <select
        id="foodType"
        class="w-full rounded-lg border p-3">

        <option value="veg">
            🟢 Veg
        </option>

        <option value="non_veg">
            🔴 Non Veg
        </option>

        <option value="egg">
            🥚 Egg
        </option>

        <option value="vegan">
            🌱 Vegan
        </option>

        <option value="jain">
            🟡 Jain
        </option>

        <option value="satvik">
            🪷 Satvik
        </option>

    </select>

</div>

    </div>


</div>
</div>
<div class="mt-3 min-h-0 flex flex-1 flex-col">

    <div
        id="itemList"
        class="grid flex-1 grid-cols-1 gap-5 overflow-y-auto md:grid-cols-2 xl:grid-cols-4">
    </div>

    <div
        id="pagination"
        class="mt-0 shrink-0 bg-slate-100 py-4 flex items-center justify-center gap-2">
    </div>

</div>

</div>

</div>

    </main>
    <div id="modalContainer"></div>

<div

id="variantModal"

class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">

<div

class="mx-4 w-full max-w-2xl max-h-[80vh] overflow-y-auto rounded-2xl bg-white p-6 shadow-2xl">

<div class="mb-2 flex items-center justify-between">

<h2 class="text-2xl font-bold">

Variants

</h2>

<button

onclick="closeVariantModal()"

class="rounded bg-red-600 px-3 py-2 text-white">

✕

</button>

</div>

<h3

id="variantItemName"

class="mb-3 text-lg font-semibold">

</h3>

<div id="variantList" class="space-y-3">

</div>

<div class="mt-4 flex gap-3">

<button

id="addVariantBtn"

class="rounded bg-blue-600 px-4 py-2 text-white">

+ Add Variant

</button>

<button

id="saveVariantsBtn"

class="rounded bg-green-600 px-4 py-2 text-white">

Save Changes

</button>

</div>

</div>

</div>


<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/align.js"></script>

<script>

loadComponent(
    "modalContainer",
    "/components/modal.html"
);
</script>

<script src="/js/modal.js"></script>
<script src="/js/menuItems.js"></script>

</body>

</html>
