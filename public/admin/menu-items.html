<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Menu Items</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="bg-slate-100">

<div class="flex">

    <div id="sidebar"></div>

    <main class="flex-1 p-8">


        <div class="rounded-xl bg-white p-6 shadow">

    <div class="grid grid-cols-2 gap-4">

        <div>

            <label class="mb-2 block font-medium">
                Category
            </label>

            <select
                id="category"
                class="w-full rounded-lg border p-3">

                <option value="">
                    Select Category
                </option>

            </select>

        </div>

        <div>

            <label class="mb-2 block font-medium">
                Item Name
            </label>

            <input
                id="itemName"
                type="text"
                class="w-full rounded-lg border p-3"
                placeholder="Paneer Tikka">

        </div>

        <div>

            <label class="mb-2 block font-medium">
                Price
            </label>

            <input
                id="price"
                type="number"
                class="w-full rounded-lg border p-3"
                placeholder="320">

        </div>

        <div>

            <label class="mb-2 block font-medium">
                Food Type
            </label>

            <select
                id="foodType"
                class="w-full rounded-lg border p-3">

                <option value="veg">
                    Veg
                </option>

                <option value="non_veg">
                    Non Veg
                </option>

                <option value="egg">
                    Egg
                </option>

            </select>

        </div>

    </div>

    <div class="mt-4">

        <label class="mb-2 block font-medium">
            Description
        </label>

        <textarea
            id="description"
            class="w-full rounded-lg border p-3"
            rows="3"></textarea>

    </div>
<input
    id="itemId"
    type="hidden">
    <button
        id="saveItemBtn"
        class="mt-6 rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-700">

        Save Item

    </button>
    <button
    id="cancelEditBtn"
    class="ml-3 mt-6 hidden rounded-lg border border-slate-300 px-6 py-3 font-semibold hover:bg-slate-100">

    Cancel

</button>

</div>

<div class="mt-8 rounded-xl bg-white p-6 shadow">

    <h2 class="mb-4 text-xl font-semibold">

        Menu Items

    </h2>
    <div class="mb-4">
    <input
        type="text"
        id="menuSearch"
        placeholder="Search menu items..."
        class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:border-blue-500 focus:outline-none">
</div>

<div id="itemList"></div>

    <div id="itemList">

    </div>

</div>

    </main>
    <div id="modalContainer"></div>

</div>
<div

id="variantModal"

class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">

<div

class="mx-4 w-full max-w-2xl max-h-[80vh] overflow-y-auto rounded-2xl bg-white p-6 shadow-2xl">

<div class="mb-6 flex items-center justify-between">

<h2 class="text-2xl font-bold">

Variants

</h2>

<button

onclick="closeVariantModal()"

class="rounded bg-red-600 px-3 py-2 text-white">

✕

</button>

</div>

<h3

id="variantItemName"

class="mb-5 text-lg font-semibold">

</h3>

<div id="variantList" class="space-y-3">

</div>

<div class="mt-5 flex gap-3">

<button

id="addVariantBtn"

class="rounded bg-blue-600 px-4 py-2 text-white">

+ Add Variant

</button>

<button

id="saveVariantsBtn"

class="rounded bg-green-600 px-4 py-2 text-white">

Save Changes

</button>

</div>

</div>

</div>

<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/sidebar.js"></script>

<script>
loadComponent(
    "sidebar",
    "/components/sidebar.html"
);

loadComponent(
    "modalContainer",
    "/components/modal.html"
);
</script>

<script src="/js/modal.js"></script>
<script src="/js/menuItems.js"></script>

</body>

</html>
