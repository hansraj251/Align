<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Menu Items</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="bg-slate-100">

<main
class="min-h-screen bg-slate-100
p-4
pt-20
md:p-6
md:pt-6
xl:p-8
xl:pt-8">
<div
class="fixed left-0 right-0 top-0 z-40 border-b bg-white px-4 py-3 shadow md:hidden">

    <div class="flex items-center gap-2">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-3 py-2 text-sm font-semibold text-white">

            Home

        </a>

        <a
            href="/admin/categories.html"
            class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-semibold text-white">

            Categories

        </a>

    </div>

</div>
<div
class="sticky top-0 z-30 -mx-6 -mt-6 mb-6 hidden items-center justify-between bg-slate-100 px-6 py-3 shadow-sm md:flex xl:-mx-8 xl:-mt-8 xl:px-8">

    <div class="flex items-center gap-3">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-5 py-2 font-medium text-white transition hover:bg-slate-800">

            Home

        </a>

        <a
            href="/admin/categories.html"
            class="rounded-lg bg-indigo-600 px-5 py-2 font-medium text-white hover:bg-indigo-700">

            Categories

        </a>

    </div>

    <input
        id="menuSearch"
        type="text"
        placeholder="Search menu items..."
        class="w-full max-w-md rounded-lg border border-slate-300 px-4 py-2">

</div>


        <div class="rounded-xl bg-white p-4 sm:p-6 shadow">

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">

        <div>

            <!-- <label class="mb-2 block font-medium">
                Category
            </label> -->

            <div class="relative">

    <input
        id="categorySearch"
        type="text"
        autocomplete="off"
        placeholder="Search category..."
        class="w-full rounded-lg border p-3">

    <input
        id="category"
        type="hidden">
    <input
    id="categoryType"
    type="hidden">    

    <div
        id="categoryResults"
        class="absolute left-0 right-0 top-full z-50 mt-1 hidden max-h-60 overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg">

    </div>

</div>

        </div>

        <div>

    <!-- <label class="mb-2 block font-medium">
        Item Name
    </label> -->

    <div class="relative">

        <input
            id="itemName"
            type="text"
            autocomplete="off"
            class="w-full rounded-lg border p-3"
            placeholder="Type item name...">

        <div
            id="itemSuggestions"
            class="absolute left-0 right-0 top-full z-50 mt-1 hidden max-h-64 overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg bg-white">

        </div>

    </div>

</div>

        <div>

            <!-- <label class="mb-2 block font-medium">
                Price
            </label> -->

            <input
                id="price"
                type="number"
                class="w-full rounded-lg border p-3"
                placeholder="Type item price...">

        </div>

        <div>

    <!-- <label class="mb-2 block font-medium">
        Food Type
    </label> -->

    <select
        id="foodType"
        class="w-full rounded-lg border p-3">

        <option value="veg">
            Veg
        </option>

        <option value="non_veg">
            Non Veg
        </option>

        <option value="egg">
            Egg
        </option>

        <option value="vegan">
            Vegan
        </option>

        <option value="jain">
            Jain
        </option>

        <option value="satvik">
            Satvik
        </option>

    </select>

</div>
<div class="col-span-2 lg:col-span-4 flex gap-2">

        <button
            id="saveItemBtn"
            class="flex-1 rounded-lg bg-blue-600 px-3 sm:px-5 py-2.5 sm:py-3 text-sm sm:text-base font-semibold text-white hover:bg-blue-700">

            Save Item

        </button>
        <input
            id="itemId"
            type="hidden">

        <button
            id="cancelEditBtn"
            class="hidden flex-1 rounded-lg border border-slate-300 px-3 sm:px-5 py-2.5 sm:py-3 text-sm sm:text-base font-semibold hover:bg-slate-100">

            Cancel

        </button>
        </div>


    </div>


</div>

</div>


<div class="mt-3 min-h-0 flex flex-1 flex-col">

    <div
        id="itemList"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 2xl:grid-cols-5 gap-4">
    </div>

    <div
        id="pagination"
        class="mt-5 flex flex-wrap items-center justify-center gap-2">
    </div>

</div>

</div>

</div>

    </main>
    <div id="modalContainer"></div>

<div

id="variantModal"

class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">

<div

class="mx-4 w-full max-w-2xl max-h-[80vh] overflow-y-auto rounded-2xl bg-white p-6 shadow-2xl">

<div class="mb-2 flex items-center justify-between">

<h2 class="text-2xl font-bold">

Variants

</h2>

<button

onclick="closeVariantModal()"

class="rounded bg-red-600 px-3 py-2 text-white">

✕

</button>

</div>

<h3

id="variantItemName"

class="mb-3 text-lg font-semibold">

</h3>

<div id="variantList" class="space-y-3">

</div>

<div class="mt-4 flex gap-3">

<button

id="addVariantBtn"

class="rounded bg-blue-600 px-4 py-2 text-white">

+ Add Variant

</button>

<button

id="saveVariantsBtn"

class="rounded bg-green-600 px-4 py-2 text-white">

Save Changes

</button>

</div>

</div>

</div>


<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/adminGuard.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/align.js"></script>

<script>

loadComponent(
    "modalContainer",
    "/components/modal.html"
);
</script>

<script src="/js/modal.js"></script>
<script src="/js/menuItems.js"></script>

</body>

</html>
