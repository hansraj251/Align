<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>KOT Print</title>

    <link
        rel="stylesheet"
        href="/css/output.css"
    >

</head>

<body class="bg-white">

    <style>

        @media print {

            @page {

                size: 80mm auto;
                margin: 2mm;

            }

            html,
            body {

                width: 80mm;
                margin: 0;
                padding: 0;
                background: #fff;

            }

            #printContainer {

                width: 76mm;
                margin: 0 auto;
                padding: 0;
                font-family: monospace;
                font-size: 12px;
                color: #000;

            }

            hr {

                border: 0;
                border-top: 1px dashed #000;
                margin: 4px 0;

            }

        }

    </style>

    <div
        id="printContainer"
    >

        <div
            id="kotContent"
        ></div>

    </div>

    <script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/adminGuard.js"></script>
<script src="/js/align.js"></script>
<script src="/js/kotPrint.js"></script>

</body>

</html>
