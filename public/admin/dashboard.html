<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Align Dashboard</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="bg-slate-100">

<div class="flex h-screen flex-col">

    <div id="mobileHeader"></div>

<div
    id="sidebarOverlay"
    class="fixed inset-0 z-40 hidden bg-black/50">
</div>

<div class="flex h-screen">

    <div id="sidebar"></div>

    <main
    id="mainContent"
    class="flex-1 overflow-y-auto
       p-4
       pt-20

       md:p-6
       md:pt-6

       xl:p-8
       xl:pt-8">

<div class="grid grid-cols-2 gap-3 md:grid-cols-2 xl:grid-cols-4 xl:gap-6">

    <div class="rounded-xl bg-white p-4 md:p-5 xl:p-6 shadow">
    <p class="text-sm text-slate-500">Today's Sales</p>

    <h2
        id="todaySales"
        class="mt-3 text-2xl font-bold md:text-2xl xl:text-3xl">

       0

    </h2>
</div>


<a
    href="/admin/floor-management.html"
    class="block rounded-xl bg-white p-4 md:p-5 xl:p-6 shadow transition duration-200 hover:-translate-y-1 hover:shadow-lg">

    <p class="text-sm text-slate-500">

        Table Occupancy

    </p>

    <h2
        id="occupiedTables"
        class="mt-3 text-2xl font-bold md:text-2xl xl:text-3xl">

        0

    </h2>

</a>

    <a
    href="/admin/menu-items.html"
    class="block rounded-xl bg-white p-4 md:p-5 xl:p-6 shadow transition duration-200 hover:-translate-y-1 hover:shadow-lg">

    <p class="text-sm text-slate-500">

        Menu Items

    </p>

    <h2
        id="menuItemCount"
        class="mt-3 text-2xl font-bold md:text-2xl xl:text-3xl">

        0

    </h2>

</a>

<a
    href="/admin/kitchen.html"
    class="block rounded-xl bg-white p-4 md:p-5 xl:p-6 shadow transition duration-200 hover:-translate-y-1 hover:shadow-lg">

    <p class="text-sm text-slate-500">

        Pending Kitchen

    </p>

    <h2
        id="pendingKitchen"
        class="mt-3 text-2xl font-bold md:text-2xl xl:text-3xl">

        0

    </h2>

</a>

</div>

<div class="mt-5 rounded-xl bg-white p-4 lg:mt-8 lg:p-6 shadow">

    <div class="mb-6 flex items-center justify-between">

        <h2 class="text-2xl font-bold">

             Dining Area

        </h2>

        <a
            href="/admin/floor-management.html"
            class="rounded-lg bg-blue-600 px-3 py-2 text-sm lg:px-4 text-white">

            Manage

        </a>

    </div>

    <div id="dashboardFloor">

        Loading...

    </div>

</div>
</div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/adminGuard.js"></script>
<script src="/js/components.js"></script>

loadComponent(

<script src="/js/dashboard.js"></script>
