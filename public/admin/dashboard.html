<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Align Dashboard</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="bg-slate-100">

<div class="flex">

    <div id="sidebar"></div>

    <main class="flex-1 p-8">

        <h1 class="mb-8 text-3xl font-bold">
    Dashboard
</h1>

<div class="grid grid-cols-4 gap-6">

    <div class="rounded-xl bg-white p-6 shadow">
    <p class="text-sm text-slate-500">Today's Sales</p>

    <h2
        id="todaySales"
        class="mt-3 text-3xl font-bold">

        ₹0

    </h2>
</div>

    <div class="rounded-xl bg-white p-6 shadow">
    <p class="text-sm text-slate-500">Today's Orders</p>

    <h2
        id="todayOrders"
        class="mt-3 text-3xl font-bold">

        0

    </h2>
</div>

    <div class="rounded-xl bg-white p-6 shadow">
        <p class="text-sm text-slate-500">Categories</p>

<h2
    id="categoryCount"
    class="mt-3 text-3xl font-bold">

    0

</h2>
    </div>

    <div class="rounded-xl bg-white p-6 shadow">
        <p class="text-sm text-slate-500">Menu Items</p>

<h2
    id="menuItemCount"
    class="mt-3 text-3xl font-bold">

    0

</h2>
    </div>

</div>
<div class="mt-8 rounded-xl bg-white p-6 shadow">

    <h2 class="mb-4 text-xl font-semibold">

        Recent Orders

    </h2>

    <div id="recentOrders">

        No Orders Yet

    </div>

</div>

    </main>

</div>


<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>

<script>
loadComponent(
    "sidebar",
    "/components/sidebar.html"
);
</script>

<script src="/js/dashboard.js"></script>

</body>

</html>
