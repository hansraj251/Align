<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Reports</title>

<link rel="stylesheet"
      href="/css/output.css">

</head>

<body class="bg-slate-100">

<main class="min-h-screen bg-slate-100 p-3 sm:p-5 lg:p-8">

<div class="sticky top-0 z-30 -mx-3 sm:-mx-5 lg:-mx-8 -mt-3 sm:-mt-5 lg:-mt-8 mb-4 bg-slate-100 px-3 sm:px-5 lg:px-8 pt-3 sm:pt-5 lg:pt-8 pb-4 shadow-sm">

<div class="flex flex-wrap gap-2">

<a
href="/admin/dashboard.html"
class="rounded-lg bg-slate-700 px-4 py-3 text-white">

←

</a>

</div>

</div>

<div class="grid grid-cols-2 gap-3 mb-5">

<input
id="fromDate"
type="date"
class="rounded-lg border p-3">

<input
id="toDate"
type="date"
class="rounded-lg border p-3">

</div>

<div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

<button
id="salesReportBtn"
class="rounded-xl bg-blue-600 p-6 text-white">

Sales Summary

</button>

<button
id="ordersReportBtn"
class="rounded-xl bg-green-600 p-6 text-white">

Orders Report

</button>

<button
id="itemsReportBtn"
class="rounded-xl bg-amber-500 p-6 text-white">

Item Sales

</button>

<button
id="paymentsReportBtn"
class="rounded-xl bg-indigo-600 p-6 text-white">

Payments

</button>

<button
id="auditReportBtn"
class="rounded-xl bg-red-600 p-6 text-white">

Audit Report

</button>

<button
id="downloadExcelBtn"
class="rounded-xl bg-emerald-700 p-6 text-white">

Download Excel

</button>

<button
id="downloadPdfBtn"
class="rounded-xl bg-slate-700 p-6 text-white">

Download PDF

</button>

</div>

<div
id="reportResult"
class="mt-6">

</div>

</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/adminGuard.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/reports.js"></script>
<script src="/js/align.js"></script>
</body>

</html>
