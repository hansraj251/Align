<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Reports</title>

<link rel="stylesheet"
      href="/css/output.css">

</head>

<body class="bg-slate-100">

<main
class="min-h-screen bg-slate-100
p-4
pt-20
md:p-6
md:pt-6
xl:p-8
xl:pt-8">
<div
class="fixed left-0 right-0 top-0 z-40 border-b bg-white px-4 py-3 shadow md:hidden">

    <div class="flex items-center gap-2">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-3 py-2 text-sm font-semibold text-white">

            Dashboard

        </a>

    </div>

</div>

<div
class="sticky top-0 z-30 -mx-6 -mt-6 mb-6 hidden items-center justify-between bg-slate-100 px-6 py-3 shadow-sm md:flex xl:-mx-8 xl:-mt-8 xl:px-8">

    <a
        href="/admin/dashboard.html"
        class="rounded-lg bg-slate-700 px-5 py-2 font-medium text-white transition hover:bg-slate-800">

        Dashboard

    </a>

    <div class="flex items-center gap-2">

        <input
            id="fromDate"
            type="date"
            class="w-44 rounded-lg border px-3 py-2">

        <input
            id="toDate"
            type="date"
            class="w-44 rounded-lg border px-3 py-2">

    </div>

</div>

<div class="grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-6">

<button
id="salesReportBtn"
class="rounded-lg bg-blue-500 px-3 py-3 text-xs font-semibold text-white transition hover:opacity-90">

Sales Summary

</button>

<button
id="ordersReportBtn"
class="rounded-lg bg-green-500 px-3 py-3 text-xs font-semibold text-white transition hover:opacity-90">

Orders Report

</button>

<button
id="itemsReportBtn"
class="rounded-lg bg-amber-400 px-3 py-3 text-xs font-semibold text-white transition hover:opacity-90">

Item Sales

</button>

<button
id="paymentsReportBtn"
class="rounded-lg bg-indigo-500 px-3 py-3 text-xs font-semibold text-white transition hover:opacity-90">

Payments

</button>

<button
id="downloadExcelBtn"
class="rounded-lg bg-emerald-600 px-3 py-3 text-xs font-semibold text-white transition hover:opacity-90">

Download Excel

</button>

<button
id="downloadPdfBtn"
class="rounded-lg bg-slate-500 px-3 py-3 text-xs font-semibold text-white transition hover:opacity-90">

Download PDF

</button>

</div>

<div
id="reportResult"
class="mt-6">

</div>

</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/adminGuard.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/reports.js"></script>
<script src="/js/align.js"></script>
</body>

</html>
