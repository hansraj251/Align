<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Align Signup</title>

    <link
        rel="stylesheet"
        href="/css/output.css">

</head>

<body class="min-h-screen bg-slate-100">

<div class="grid min-h-screen grid-cols-2">

    <div class="flex items-center justify-center bg-blue-700">

        <div class="text-center text-white">

            <h1 class="mb-4 text-6xl font-bold">

                ALIGN

            </h1>

            <p class="text-xl">

                Smart Restaurant Operating System

            </p>

        </div>

    </div>

    <div class="flex items-center justify-center">

        <div class="w-full max-w-md rounded-2xl bg-white p-10 shadow-xl">

            <h2 class="mb-2 text-3xl font-bold">

                Create Account

            </h2>

            <p class="mb-8 text-gray-500">

                Start managing your restaurant with Align

            </p>
<form id="signupForm">
            <input
                id="restaurantName"
                type="text"
                placeholder="Restaurant Name"
                class="mb-4 w-full rounded-lg border border-gray-300 p-3">

            <input
                id="ownerName"
                type="text"
                placeholder="Owner Name"
                class="mb-4 w-full rounded-lg border border-gray-300 p-3">

            <input
                id="email"
                type="email"
                placeholder="Email Address"
                class="mb-4 w-full rounded-lg border border-gray-300 p-3">

            <input
                id="mobile"
                type="tel"
                placeholder="Mobile Number"
                class="mb-4 w-full rounded-lg border border-gray-300 p-3">

            <input
                id="password"
                type="password"
                autocomplete="new-password"
                placeholder="Password"
                class="mb-6 w-full rounded-lg border border-gray-300 p-3">

            <button
    id="signupBtn"
    type="submit"
    class="w-full rounded-lg bg-blue-600 py-3 font-semibold text-white hover:bg-blue-700">

    Create Account

</button>
</form>
            <div class="mt-6 text-center text-sm text-gray-600">

                Already have an account?

                <a
                    href="/admin/login.html"
                    class="font-semibold text-blue-600 hover:underline">

                    Login

                </a>

            </div>

            <div
                id="result"
                class="mt-6 text-center text-red-600">

            </div>

        </div>

    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/signup.js"></script>

</body>

</html>
