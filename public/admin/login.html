<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Align Login</title>

    <link rel="stylesheet" href="/css/output.css">
</head>

<body class="min-h-screen bg-slate-100">

<div class="min-h-screen lg:grid lg:grid-cols-2">

    <!-- Left Panel (Desktop Only) -->
    <div class="hidden bg-blue-700 lg:flex items-center justify-center">

        <div class="text-center text-white px-10">

            <img
    src="/images/logo.png"
    alt="Align Logo"
    class="mx-auto mb-6 h-40 w-40 object-contain">

<h1 class="text-5xl font-bold">
    ALIGN
</h1>

<p class="mt-4 text-xl">
    Smart OS
</p>

        </div>

    </div>

    <!-- Login -->
    <div class="flex min-h-screen items-center justify-center p-6">

        <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-xl">

            <!-- Mobile Logo -->
            <div class="mb-8 text-center lg:hidden">

    <img
        src="/images/logo.png"
        alt="Align Logo"
        class="mx-auto mb-4 h-24 w-24 object-contain">

    <h1 class="text-3xl font-bold text-slate-800">
        ALIGn
    </h1>

    <p class="mt-2 text-slate-500">
        Smart OS
    </p>

</div>

            <h2 class="mb-2 text-3xl font-bold">

                Welcome Back

            </h2>

            <input
                id="loginId"
                type="text"
                placeholder="Username or Email"
                class="mb-4 w-full rounded-xl border border-gray-300 p-4 text-lg focus:border-blue-500 focus:outline-none">

            <input
                id="password"
                type="password"
                placeholder="Password"
                class="mb-6 w-full rounded-xl border border-gray-300 p-4 text-lg focus:border-blue-500 focus:outline-none">

            <button
                id="loginBtn"
                class="w-full rounded-xl bg-blue-600 py-4 text-lg font-semibold text-white transition active:scale-95 hover:bg-blue-700">

                Login

            </button>

            <div class="mt-6 text-center">

                <span class="text-gray-600">

                    Don't have an account?

                </span>

                <a
                    href="/admin/signup.html"
                    class="ml-1 font-semibold text-blue-600 hover:underline">

                    Create Account

                </a>

            </div>

            <div
                id="result"
                class="mt-5 text-center text-red-600">

            </div>

        </div>

    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/login.js"></script>

</body>
</html>
