<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Orders</title>

    <link
        rel="stylesheet"
        href="/css/output.css">

</head>

<body class="bg-slate-100">

<main class="min-h-screen bg-slate-100 p-8">

        <div class="sticky top-0 z-30 -mx-8 mb-6 bg-slate-100 px-8 pt-6 pb-4">

    <div class="mb-6 flex items-center justify-between">

        <div>

            <h1 class="text-3xl font-bold">

                Orders

            </h1>

            <p class="mt-1 text-slate-500">

                Manage all customer orders

            </p>

        </div>

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-blue-600 px-5 py-3 font-medium text-white transition hover:bg-blue-700">

            ← Dashboard

        </a>

    </div>

    <div class="rounded-xl bg-white p-6 shadow">

        <div class="flex flex-wrap items-end gap-4">

            <div>

                <label class="mb-1 block text-sm font-medium">

                    From

                </label>

                <input
                    id="fromDate"
                    type="date"
                    class="rounded-lg border p-2">

            </div>

            <div>

                <label class="mb-1 block text-sm font-medium">

                    To

                </label>

                <input
                    id="toDate"
                    type="date"
                    class="rounded-lg border p-2">

            </div>

            <button
                id="searchBtn"
                class="rounded-lg bg-blue-600 px-5 py-2 text-white">

                Search

            </button>

        </div>

    </div>

</div>

<div
    id="ordersTable"
    class="grid gap-5 grid-cols-1 md:grid-cols-2 xl:grid-cols-4">
</div>

</div>

    </main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/components.js"></script>
<script src="/js/orders.js"></script>

</body>

</html>
