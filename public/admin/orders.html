<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Orders</title>

    <link
        rel="stylesheet"
        href="/css/output.css">

</head>

<body class="bg-slate-100">

<main class="min-h-screen bg-slate-100 p-8">

        <div class="sticky top-0 z-30 -mx-8 -mt-8 mb-6 bg-slate-100 px-8 pt-8 pb-4 shadow-sm">

    <div class="flex items-center gap-4">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-5 py-3 font-medium text-white hover:bg-slate-800">

            ← Dashboard

        </a>

        <div class="ml-auto flex items-center gap-3">

            <input
                id="fromDate"
                type="date"
                class="rounded-lg border px-3 py-2">

            <input
                id="toDate"
                type="date"
                class="rounded-lg border px-3 py-2">

            <button
                id="searchBtn"
                class="rounded-lg bg-blue-600 px-5 py-2 text-white hover:bg-blue-700">

                Search

            </button>

        </div>

    </div>

</div>

<div
    id="ordersTable"
    class="grid gap-5 grid-cols-1 md:grid-cols-2 xl:grid-cols-4">
</div>

</div>

    </main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/components.js"></script>
<script src="/js/orders.js"></script>
<script src="/js/align.js"></script>

</body>

</html>
