<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Settings</title>

    <link rel="stylesheet" href="/css/output.css">
</head>

<body class="bg-slate-100">

<main
class="min-h-screen bg-slate-100
p-4
pt-20
md:p-6
md:pt-6
xl:p-8
xl:pt-8">

<div
class="fixed left-0 right-0 top-0 z-40 border-b bg-white px-4 py-3 shadow md:hidden">

    <div class="flex items-center justify-between">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-3 py-2 text-white">

            ← Dashboard

        </a>

        <h1 class="text-lg font-bold">

            Profile

        </h1>

    </div>

</div>

<div
class="mb-6 hidden items-center justify-between md:flex">

    <a
        href="/admin/dashboard.html"
        class="rounded-lg bg-slate-700 px-5 py-3 font-medium text-white hover:bg-slate-800">

        Dashboard

    </a>

    <h1 class="text-3xl font-bold">

        Profile

    </h1>

</div>
        <div class="rounded-xl bg-white p-8 shadow">

<!-- Restaurant Profile -->

<div class="grid grid-cols-2 gap-6">

    <div>

        <label class="mb-2 block font-medium">

            Business Name

        </label>

        <input
            id="restaurantName"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">

            Owner Name

        </label>

        <input
            id="ownerName"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">

            Mobile

        </label>

        <input
            id="mobile"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">

            Email

        </label>

        <input
            id="email"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">

            GST Number

        </label>

        <input
            id="gstNumber"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">

            FSSAI Number

        </label>

        <input
            id="fssaiNumber"
            class="w-full rounded-lg border p-3">

    </div>

</div>

        <label class="mt-6 mb-2 block font-medium">
    Update Business Logo
</label>

<input
    id="logo"
    type="file"
    accept="image/*"
    class="hidden">

<img
    id="logoPreview"
    class="h-36 w-36 cursor-pointer rounded-xl border-2 border-dashed border-slate-300 object-contain p-3 transition hover:border-blue-600">
   


<label class="mt-4 mb-2 block font-medium">
    Address
</label>

<textarea
    id="address"
    rows="3"
    class="w-full rounded-lg border p-3"></textarea>

<div class="mt-6 grid grid-cols-3 gap-6">

    

    <input
        id="city"
        placeholder="City"
        class="rounded-lg border p-3">

    <input
        id="state"
        placeholder="State"
        class="rounded-lg border p-3">

    <input
        id="pincode"
        placeholder="Pincode"
        class="rounded-lg border p-3">

</div>

<button
    id="saveRestaurantBtn"
    class="mt-6 rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white">

    Save Restaurant

</button>

</div>
</div>
</div>


<div class="mt-8 rounded-xl bg-white p-8 shadow">

<h2 class="mb-4 text-xl font-semibold">
    POS Settings
</h2>

<label class="mb-2 block font-medium">
    Footer Message
</label>

<textarea
    id="footerMessage"
    rows="3"
    class="w-full rounded-lg border p-3"></textarea>

<div class="mt-4 grid grid-cols-2 gap-4">
    

    <input
        id="cgst"
        type="number"
        step="0.01"
        placeholder="CGST %"
        class="rounded-lg border p-3">

    <input
        id="sgst"
        type="number"
        step="0.01"
        placeholder="SGST %"
        class="rounded-lg border p-3">

</div>
<div class="mt-6 grid grid-cols-2 gap-4">

    <div>

        <label class="mb-2 block font-medium">

            Currency

        </label>

        <select

            id="currency"

            class="w-full rounded-lg border p-3">

<option value="INR">

₹ Indian Rupee (INR)

</option>

<option value="USD">

$ US Dollar (USD)

</option>

<option value="EUR">

€ Euro (EUR)

</option>

<option value="GBP">

£ Pound (GBP)

</option>

<option value="AED">

AED UAE Dirham

</option>

</select>

    </div>

    <div>

        <label class="mb-2 block font-medium">

            Time Zone

        </label>

        <select

            id="timeZone"

            class="w-full rounded-lg border p-3">

<option value="Asia/Kolkata">

Asia/Kolkata

</option>

<option value="Asia/Dubai">

Asia/Dubai

</option>

<option value="Europe/London">

Europe/London

</option>

<option value="America/New_York">

America/New_York

</option>

<option value="Australia/Sydney">

Australia/Sydney

</option>

 </select>

    </div>

</div>

<button
    id="saveSettingsBtn"
    class="mt-6 rounded-lg bg-green-600 px-6 py-3 font-semibold text-white">

    Save POS Settings

</button>
</div>
</div>
 </main>

<script src="/js/components.js"></script>

<script src="/js/api.js"></script>

<script src="/js/auth.js"></script>
<script src="/js/adminGuard.js"></script>

<script src="/js/toast.js"></script>
<script src="/js/align.js"></script>

<script src="/js/settings.js"></script>

</body>
</html>
