<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Settings</title>

    <link rel="stylesheet" href="/css/output.css">
</head>

<body class="bg-slate-100">

<div class="flex">

    <div id="sidebar"></div>

    <main class="flex-1 p-8">
        <div class="rounded-xl bg-white p-8 shadow">

    <h1 class="mb-6 text-3xl font-bold">
    Restaurant Settings
</h1>

<!-- Restaurant Profile -->

<h2 class="mb-4 text-xl font-semibold">
    Restaurant Profile
</h2>

<label class="mb-2 block font-medium">
    Restaurant Name
</label>

<input
    id="restaurantName"
    class="w-full rounded-lg border p-3">

<div class="mt-4 grid grid-cols-2 gap-6">

    <div>

        <label class="mb-2 block font-medium">
            Owner Name
        </label>

        <input
            id="ownerName"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">
            Mobile
        </label>

        <input
            id="mobile"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">
            Email
        </label>

        <input
            id="email"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">
            GST Number
        </label>

        <input
            id="gstNumber"
            class="w-full rounded-lg border p-3">

    </div>

    <div>

        <label class="mb-2 block font-medium">
            FSSAI Number
        </label>

        <input
            id="fssaiNumber"
            class="w-full rounded-lg border p-3">

    </div>

</div>

<label class="mt-4 mb-2 block font-medium">
    Address
</label>

<textarea
    id="address"
    rows="3"
    class="w-full rounded-lg border p-3"></textarea>

<div class="mt-6 grid grid-cols-3 gap-6">

    <input
        id="city"
        placeholder="City"
        class="rounded-lg border p-3">

    <input
        id="state"
        placeholder="State"
        class="rounded-lg border p-3">

    <input
        id="pincode"
        placeholder="Pincode"
        class="rounded-lg border p-3">

</div>

<button
    id="saveRestaurantBtn"
    class="mt-6 rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white">

    Save Restaurant

</button>
</div>

<div class="mt-8 rounded-xl bg-white p-8 shadow">

<h2 class="mb-4 text-xl font-semibold">
    POS Settings
</h2>

<label class="mb-2 block font-medium">
    Footer Message
</label>

<textarea
    id="footerMessage"
    rows="3"
    class="w-full rounded-lg border p-3"></textarea>

<div class="mt-4 grid grid-cols-2 gap-4">

    <input
        id="cgst"
        type="number"
        step="0.01"
        placeholder="CGST %"
        class="rounded-lg border p-3">

    <input
        id="sgst"
        type="number"
        step="0.01"
        placeholder="SGST %"
        class="rounded-lg border p-3">

</div>

<button
    id="saveSettingsBtn"
    class="mt-6 rounded-lg bg-green-600 px-6 py-3 font-semibold text-white">

    Save POS Settings

</button>
</div>
</div>
 </main>

</div>

<script src="/js/components.js"></script>

<script src="/js/api.js"></script>

<script src="/js/toast.js"></script>

<script>

loadComponent(

    "sidebar",

    "/components/sidebar.html"

);

</script>

<script src="/js/settings.js"></script>

</body>
</html>
