    <input

</div>

                type="text"
                placeholder="Category Name"
                class="w-full rounded-lg border p-3">
             <div
        id="categorySuggestions"
        class="absolute left-0 right-0 top-full z-50 hidden rounded-lg border bg-white shadow-lg">
    </div> 
    </div>   

            <input

            <div class="col-span-2 flex gap-2">

    <button
        id="cancelEditBtn"
