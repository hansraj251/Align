<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu Categories</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="bg-slate-100">

<main class="min-h-screen bg-slate-100 p-3 sm:p-5 lg:p-8">
    <div class="sticky top-0 z-30 -mx-3 sm:-mx-5 lg:-mx-8 -mt-3 sm:-mt-5 lg:-mt-8 mb-4 bg-slate-100 px-3 sm:px-5 lg:px-8 pt-3 sm:pt-5 lg:pt-8 pb-4 shadow-sm">

    <div class="flex flex-wrap items-center gap-2">

    <a
        href="/admin/dashboard.html"
        class="rounded-lg bg-slate-700 px-3 sm:px-5 py-2.5 sm:py-3 text-sm sm:text-base font-medium text-white hover:bg-slate-800">

        ←

    </a>

    <a
        href="/admin/menu-items.html"
        class="rounded-lg bg-indigo-600 px-3 sm:px-5 py-2.5 sm:py-3 text-sm sm:text-base font-medium text-white hover:bg-indigo-700">

        ← Menu Items

    </a>

    <input
        id="categorySearch"
        type="text"
        placeholder="Search categories..."
        class="min-w-[220px] flex-1 rounded-lg border border-slate-300 px-4 py-3">

</div>

    <div class="mt-4 rounded-xl bg-white p-4 sm:p-6 shadow">

        <div class="grid grid-cols-2 gap-2 sm:gap-4">

            <input
                id="categoryName"
                type="text"
                placeholder="Category Name"
                class="w-full rounded-lg border p-3">

            <input
                id="categoryDescription"
                type="text"
                placeholder="Description (Optional)"
                class="w-full rounded-lg border p-3">

            <input
                id="categoryId"
                type="hidden">

            <div class="col-span-2 flex gap-2">

    <button
        id="saveCategoryBtn"
        class="flex-1 rounded-lg bg-blue-600 px-3 sm:px-5 py-2.5 sm:py-3 text-sm sm:text-base font-semibold text-white hover:bg-blue-700">

        Add Category

    </button>

    <button
        id="cancelEditBtn"
        class="hidden flex-1 rounded-lg border border-slate-300 px-3 sm:px-5 py-2.5 sm:py-3 text-sm sm:text-base font-semibold hover:bg-slate-100">

        Cancel

    </button>

</div>    

        </div>

    </div>

</div>


            <div
    id="categoryList"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-6 gap-4">

</div>

        </div>

    </main>
<div id="modalContainer"></div>

<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/align.js"></script>

<script>
loadComponent(
    "modalContainer",
    "/components/modal.html"
);
</script>
<script src="/js/categories.js"></script>


</body>

</html>
