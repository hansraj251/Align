<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu Categories</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="bg-slate-100">

<main class="min-h-screen bg-slate-100 p-8">
    <div class="sticky top-0 z-30 -mx-8 -mt-8 mb-6 bg-slate-100 px-8 pt-8 pb-4 shadow-sm">

    <div class="flex items-center gap-3">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-5 py-3 font-medium text-white hover:bg-slate-800">

            ← Dashboard

        </a>

        <a
            href="/admin/menu-items.html"
            class="rounded-lg bg-indigo-600 px-5 py-3 font-medium text-white hover:bg-indigo-700">

            Menu Items

        </a>

        <a
            href="/admin/floor-management.html"
            class="rounded-lg bg-emerald-600 px-5 py-3 font-medium text-white hover:bg-emerald-700">

            Manage Areas

        </a>

        <button
            id="saveCategoryBtn"
            class="rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-700">

            Add Category

        </button>

        <button
            id="cancelEditBtn"
            class="hidden rounded-lg border border-slate-300 px-6 py-3 font-semibold hover:bg-slate-100">

            Cancel

        </button>

    </div>

    <div class="mt-6 rounded-xl bg-white p-6 shadow">

        <div class="grid gap-4 md:grid-cols-2">

            <input
                id="categoryName"
                type="text"
                placeholder="Category Name"
                class="rounded-lg border p-3">

            <input
                id="categoryDescription"
                type="text"
                placeholder="Description (Optional)"
                class="rounded-lg border p-3">

            <input
                id="categoryId"
                type="hidden">

        </div>

    </div>

</div>

            <div
    id="categoryList"
    class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-6">

</div>

        </div>

    </main>
<div id="modalContainer"></div>

<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/align.js"></script>

<script>
loadComponent(
    "modalContainer",
    "/components/modal.html"
);
</script>
<script src="/js/categories.js"></script>


</body>

</html>
