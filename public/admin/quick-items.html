<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Quick Items
    </title>

    <link
        rel="stylesheet"
        href="/css/output.css">

</head>

<body class="bg-slate-100">

<main
class="min-h-screen bg-slate-100 p-4 pt-20 md:p-6 md:pt-6 xl:p-8 xl:pt-8">

<div
class="fixed left-0 right-0 top-0 z-40 border-b bg-white px-4 py-3 shadow md:hidden">

    <div class="flex items-center gap-2">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-3 py-2 text-sm font-semibold text-white">

            Home

        </a>

    </div>

</div>

<div
class="sticky top-0 z-30 -mx-6 -mt-6 mb-6 hidden items-center justify-between bg-slate-100 px-6 py-3 shadow-sm md:flex xl:-mx-8 xl:-mt-8 xl:px-8">

    <a
        href="/admin/dashboard.html"
        class="rounded-lg bg-slate-700 px-5 py-2 font-medium text-white transition hover:bg-slate-800">

        Home

    </a>

</div>

<div class="rounded-xl bg-white p-6 shadow">

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">

        <input
            id="quickItemName"
            type="text"
            placeholder="Quick Item Name"
            class="w-full rounded-lg border p-3">

        <input
            id="quickItemPrice"
            type="number"
            step="0.01"
            placeholder="Price"
            class="w-full rounded-lg border p-3">

        <input
            id="quickItemSortOrder"
            type="number"
            value="0"
            placeholder="Sort Order"
            class="w-full rounded-lg border p-3">

        <label
            class="flex items-center gap-3 rounded-lg border p-3">

            <input
                id="quickItemActive"
                type="checkbox"
                checked>

            <span>

                Active

            </span>

        </label>

    </div>

    <input
        id="quickItemId"
        type="hidden">

    <div class="mt-5 flex gap-3">

        <button
            id="saveQuickItemBtn"
            class="flex-1 rounded-lg bg-blue-600 px-5 py-3 font-semibold text-white hover:bg-blue-700">

            Save Quick Item

        </button>

        <button
            id="cancelEditBtn"
            class="hidden flex-1 rounded-lg border border-slate-300 px-5 py-3 font-semibold hover:bg-slate-100">

            Cancel

        </button>

    </div>

</div>

<div
    id="quickItemList"
    class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">

</div>

</main>

<div id="modalContainer"></div>

<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/adminGuard.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/align.js"></script>

<script>

loadComponent(

    "modalContainer",

    "/components/modal.html"

);

</script>

<script src="/js/modal.js"></script>

<script src="/js/quickItems.js"></script>

</body>

</html>
