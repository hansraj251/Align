<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Order</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="h-screen overflow-hidden overflow-x-hidden bg-slate-100">

<main class="flex h-screen min-w-0 flex-col overflow-hidden bg-slate-100 p-3 md:p-5 lg:p-8">
    

        <div class="sticky top-0 z-30 -mx-3 -mt-3 mb-4 bg-slate-100 px-3 pt-3 pb-3 md:-mx-5 md:-mt-5 md:px-5 lg:-mx-8 lg:-mt-8 lg:mb-6 lg:px-8 lg:pt-8 lg:pb-4">
    
    <div
    class="flex items-center gap-2 lg:hidden">

    <button
        id="backBtnMobile"
        class="rounded-lg bg-slate-700 px-3 py-2 text-white">

        ←

    </button>

    <input

        id="menuSearchMobile"

        type="text"

        placeholder="Search Menu..."

        class="flex-1 rounded-lg border px-3 py-2 text-sm">

    <a

        href="/admin/dashboard.html"

        class="rounded-lg bg-blue-600 px-3 py-2 text-white">

        🏠

    </a>

</div>        <div
    class="hidden lg:flex items-center gap-4">

        <button
            id="backBtn"
            class="rounded-lg bg-slate-700 px-3 py-2 text-sm text-white xl:px-5 xl:py-3 xl:text-base">

            Back

        </button>
        
        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800 xl:px-5 xl:py-3 xl:text-base">

            Dashboard

        </a>

        <button
    id="kitchenBtn"
    class="hidden lg:block rounded-lg bg-indigo-600 px-3 py-2 text-sm font-medium text-white hover:bg-indigo-700 xl:px-5 xl:py-3 xl:text-base">

    Kitchen

</button>
        <a
    href="/admin/billing.html"
    class="hidden lg:block rounded-lg bg-indigo-600 px-3 py-2 text-sm font-medium text-white hover:bg-indigo-700 xl:px-5 xl:py-3 xl:text-base">
            Billing

        </a>

        <input

            id="menuSearch"

            type="text"

            placeholder="Search menu..."

             class="ml-auto w-full max-w-xl rounded-lg border px-4 py-3">

    </div>

</div>

</div>

        <div class="grid min-h-0 flex-1 gap-3 overflow-hidden lg:grid-cols-3 lg:gap-6">

    <!-- LEFT -->

    <div class="col-span-1 min-h-0 min-w-0 lg:col-span-2">

       <div class="flex h-full min-w-0 flex-col rounded-xl bg-white p-3 shadow lg:p-5">

           
            <!-- Category -->

            <div class="mb-4">

                <div

                    id="categoryFilters"
class="flex gap-2 overflow-x-auto overflow-y-hidden whitespace-nowrap pb-2">

                </div>

            </div>

            <!-- Food Type -->

            <div class="mb-5">

                <div

                    id="foodFilters"

                    class="flex gap-2 overflow-x-auto overflow-y-hidden whitespace-nowrap pb-2">

                </div>

            </div>

            <!-- Menu -->

            <div
    id="menuList"
    class="mt-3 grid flex-1 grid-cols-1 gap-2 overflow-y-auto overflow-x-hidden pb-24 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

            </div>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="hidden min-h-0 lg:block">

        <div class="flex h-full flex-col rounded-xl bg-white p-5 shadow">

            <h2 class="mb-4 text-xl font-semibold">

                Cart

            </h2>

            <div
    id="cart"
    class="min-h-0 flex-1 overflow-y-auto">

                No Items

            </div>
            <div
    id="orderAction"
    class="hidden mt-3">
</div>

            <div class="mt-6 border-t pt-4">

                <div class="flex justify-between text-lg">

                    <span>

                        Total

                    </span>

                    <strong id="total">

                       0

                    </strong>

                </div>

                <button

                    id="sendKitchenBtn"

                    class="mt-6 w-full rounded-lg bg-blue-600 py-3 text-white hover:bg-blue-700">

                    Send To Kitchen

                </button>

            </div>

        </div>

    </div>

</div>
<div
id="mobileCartBar"
class="fixed bottom-0 left-0 right-0 z-50 hidden border-t bg-white p-4 shadow-2xl lg:hidden">

    <div class="flex items-center justify-between">

        <div>

            <div

                id="mobileItemCount"

                class="font-semibold">

                0 Items

            </div>

            <div

                id="mobileTotal">

               0

            </div>

        </div>

        <button

            id="mobileViewCartBtn"

            class="rounded-xl bg-blue-600 px-5 py-2.5 text-xs text-sm font-semibold text-white">

            View Cart

        </button>

    </div>

</div>
<!-- Mobile Cart Sheet -->
<div
    id="cartSheet"
    class="fixed inset-0 z-[60] hidden bg-black/40 lg:hidden">

    <div
        class="absolute bottom-0 left-0 right-0 max-h-[85vh] overflow-hidden rounded-t-3xl bg-white">

        <div class="flex items-center justify-between border-b px-4 py-3">

            <h2 class="text-lg font-bold">
                Cart
            </h2>

            <button
                onclick="closeCart()"
                class="rounded-lg bg-slate-200 px-3 py-2">

                ✕

            </button>

        </div>

        <div
            id="cartItemsList"
            
            class="max-h-[60vh] space-y-3 overflow-y-auto px-4 py-3">
        </div>
        <div
    id="mobileOrderAction"
    class="hidden border-t px-4 py-3">
</div>

        <div class="border-t px-4 py-3">

            <div class="mb-4 flex justify-between text-lg font-bold">

                <span>Total</span>

                <span id="cartSheetTotal">
                    ₹0
                </span>

            </div>

            <button
                id="checkoutBtn"
                class="w-full rounded-xl bg-blue-600 py-3 font-semibold text-white">

                Send To Kitchen

            </button>

        </div>

    </div>

</div>

    </main>

<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>

<script src="/js/align.js"></script>

<script src="/js/order/constants.js"></script>
<script src="/js/order/state.js"></script>
<script src="/js/order/cart.js"></script>

<script src="/js/order/status.js"></script>
<script src="/js/order.js"></script>

</body>

</html>
