<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Order</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="bg-slate-100">

<main class="min-h-screen bg-slate-100 p-8">

        <div class="mb-8 flex items-center justify-between">

    <div>

        <h1 class="text-3xl font-bold">

            Menu

        </h1>

    </div>

    <button
    id="backBtn"
    class="rounded-lg bg-slate-700 px-5 py-3 font-medium text-white">

    ← Back

</button>

</div>

        <div class="grid gap-6 lg:grid-cols-3">

    <!-- LEFT -->

    <div class="lg:col-span-2">

        <div class="rounded-xl bg-white p-5 shadow">

            <!-- Search -->

            <input

                id="menuSearch"

                type="text"

                placeholder="Search menu items..."

                class="mb-4 w-full rounded-lg border border-slate-300 px-4 py-3 outline-none focus:border-blue-600">

            <!-- Category -->

            <div class="mb-4">

                <h3 class="mb-2 text-sm font-semibold text-slate-600">

                    Categories

                </h3>

                <div

                    id="categoryFilters"

                    class="flex gap-2 overflow-x-auto pb-2">

                </div>

            </div>

            <!-- Food Type -->

            <div class="mb-5">

                <h3 class="mb-2 text-sm font-semibold text-slate-600">

                    Food Type

                </h3>

                <div

                    id="foodFilters"

                    class="flex gap-2 overflow-x-auto pb-2">

                </div>

            </div>

            <!-- Menu -->

            <div

                id="menuList"

                class="space-y-3">

            </div>

        </div>

    </div>

    <!-- RIGHT -->

    <div>

        <div

            class="sticky top-5 rounded-xl bg-white p-5 shadow">

            <h2 class="mb-4 text-xl font-semibold">

                Cart

            </h2>

            <div id="cart">

                No Items

            </div>

            <div class="mt-6 border-t pt-4">

                <div class="flex justify-between text-lg">

                    <span>

                        Total

                    </span>

                    <strong id="total">

                        ₹0

                    </strong>

                </div>

                <button

                    id="sendKitchenBtn"

                    class="mt-6 w-full rounded-lg bg-blue-600 py-3 text-white hover:bg-blue-700">

                    Send To Kitchen

                </button>

            </div>

        </div>

    </div>

</div>
<div

    id="mobileCartBar"

    class="fixed bottom-0 left-0 right-0 z-50 hidden border-t bg-white p-4 shadow-2xl lg:hidden">

    <div class="flex items-center justify-between">

        <div>

            <div

                id="mobileItemCount"

                class="font-semibold">

                0 Items

            </div>

            <div

                id="mobileTotal">

                ₹0

            </div>

        </div>

        <button

            id="mobileSendBtn"

            class="rounded-lg bg-blue-600 px-6 py-3 text-white">

            Send

        </button>

    </div>

</div>

    </main>

<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>

<script src="/js/align.js"></script>

<script src="/js/order/constants.js"></script>
<script src="/js/order/state.js"></script>
<script src="/js/order/cart.js"></script>

<script src="/js/order.js"></script>

</body>

</html>
