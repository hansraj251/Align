<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Order</title>

    <link rel="stylesheet" href="/css/output.css">

</head>

<body class="h-screen overflow-hidden bg-slate-100">

<main class="flex h-screen flex-col bg-slate-100 p-8">

        <div class="shrink-0 sticky top-0 z-30 -mx-8 -mt-8 mb-6 bg-slate-100 px-8 pt-8 pb-4">
    <div class="flex items-center gap-4">

        <button
            id="backBtn"
            class="rounded-lg bg-slate-700 px-5 py-3 text-white">

            ← Back

        </button>
        
        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-5 py-3 font-medium text-white hover:bg-slate-800">

            ← Dashboard

        </a>

        <button
    id="kitchenBtn"
    class="rounded-lg bg-indigo-600 px-5 py-3 font-medium text-white hover:bg-indigo-700">

    Kitchen

</button>
        <a
            href="/admin/billing.html"
            class="rounded-lg bg-indigo-600 px-5 py-3 font-medium text-white hover:bg-indigo-700">

            Billing

        </a>

        <input

            id="menuSearch"

            type="text"

            placeholder="Search menu..."

            class="mx-auto w-full max-w-xl rounded-lg border px-4 py-3">

    </div>

</div>

</div>

        <div class="grid flex-1 min-h-0 gap-6 lg:grid-cols-3">

    <!-- LEFT -->

    <div class="min-h-0 lg:col-span-2">

       <div class="flex h-full flex-col rounded-xl bg-white p-5 shadow">

           
            <!-- Category -->

            <div class="mb-4">

                <div

                    id="categoryFilters"

                    class="flex gap-2 overflow-x-auto pb-2">

                </div>

            </div>

            <!-- Food Type -->

            <div class="mb-5">

                <div

                    id="foodFilters"

                    class="flex gap-2 overflow-x-auto pb-2">

                </div>

            </div>

            <!-- Menu -->

            <div
    id="menuList"
class="mt-3 grid grid-cols-2 gap-4 overflow-y-auto xl:grid-cols-4">

            </div>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="min-h-0">

        <div class="flex h-full flex-col rounded-xl bg-white p-5 shadow">

            <h2 class="mb-4 text-xl font-semibold">

                Cart

            </h2>

            <div
    id="cart"
    class="min-h-0 flex-1 overflow-y-auto">

                No Items

            </div>

            <div class="mt-6 border-t pt-4">

                <div class="flex justify-between text-lg">

                    <span>

                        Total

                    </span>

                    <strong id="total">

                       0

                    </strong>

                </div>

                <button

                    id="sendKitchenBtn"

                    class="mt-6 w-full rounded-lg bg-blue-600 py-3 text-white hover:bg-blue-700">

                    Send To Kitchen

                </button>

            </div>

        </div>

    </div>

</div>
<div

    id="mobileCartBar"

    class="fixed bottom-0 left-0 right-0 z-50 hidden border-t bg-white p-4 shadow-2xl lg:hidden">

    <div class="flex items-center justify-between">

        <div>

            <div

                id="mobileItemCount"

                class="font-semibold">

                0 Items

            </div>

            <div

                id="mobileTotal">

               0

            </div>

        </div>

        <button

            id="mobileSendBtn"

            class="rounded-lg bg-blue-600 px-6 py-3 text-white">

            Send

        </button>

    </div>

</div>

    </main>

<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/toast.js"></script>

<script src="/js/align.js"></script>

<script src="/js/order/constants.js"></script>
<script src="/js/order/state.js"></script>
<script src="/js/order/cart.js"></script>

<script src="/js/order.js"></script>

</body>

</html>
