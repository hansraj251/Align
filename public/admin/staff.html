<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Staff Management</title>

    <link
        rel="stylesheet"
        href="/css/output.css">

</head>

<body class="bg-slate-100">

<main
class="min-h-screen bg-slate-100
p-4
pt-20
md:p-6
md:pt-6
xl:p-8
xl:pt-8">

<!-- Mobile Header -->

<div
class="fixed left-0 right-0 top-0 z-40 border-b bg-white px-4 py-3 shadow md:hidden">

    <div class="flex flex-wrap items-center gap-2">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-3 py-2 text-sm font-semibold text-white">

            Dashboard

        </a>
        <a
            href="/admin/settings.html"
            class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white">

            Settings

        </a>

        <button
            id="addStaffBtnMobile"
            class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white">

            + Add

        </button>

    </div>

</div>

<!-- Desktop Header -->

<div
    class="sticky top-0 z-30 -mx-6 -mt-6 mb-6 hidden items-center justify-between bg-slate-100 px-6 py-3 shadow-sm md:flex xl:-mx-8 xl:-mt-8 xl:px-8">

    <div class="flex items-center gap-3">

        <a
            href="/admin/dashboard.html"
            class="rounded-lg bg-slate-700 px-5 py-2 font-medium text-white transition hover:bg-slate-800">

            Dashboard

        </a>

        <a
            href="/admin/settings.html"
            class="rounded-lg bg-indigo-600 px-5 py-2 font-medium text-white hover:bg-indigo-700">

            Settings

        </a>

        <button
            id="addStaffBtn"
            class="rounded-lg bg-blue-600 px-5 py-2 font-semibold text-white transition hover:bg-blue-700">

            + Add Staff

        </button>

    </div>

    <h1 class="text-2xl font-bold">

        👥 Staff

    </h1>

</div>

        <div
    class="mb-5 rounded-xl bg-white p-4 shadow md:p-5">
            <input

                id="searchStaff"

                type="text"

                placeholder="Search by name, mobile or role..."

                class="w-full rounded-lg border px-4 py-3">

        </div>

        <div
            id="staffList"
            class="space-y-4">

            Loading...

        </div>

    </main>

<div id="modalContainer"></div>

<script src="/js/components.js"></script>

<script src="/js/api.js"></script>

<script src="/js/auth.js"></script>
<script src="/js/adminGuard.js"></script>

<script src="/js/toast.js"></script>

<script>

(async () => {

    await loadComponent(
        "modalContainer",
        "/components/modal.html"
    );

})();

</script>

<script src="/js/modal.js"></script>
<script src="/js/align.js"></script>
<script src="/js/staff.js"></script>

</body>

</html>
