<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Ready Items</title>

<link
rel="stylesheet"
href="/css/output.css">

</head>

<body class="bg-slate-100">

<div class="mx-auto max-w-7xl p-4">

    <!-- Header -->

    <div
    class="mb-6 flex items-center justify-between">

        <div>

            <h1
            class="text-3xl font-bold">

                Ready Items

            </h1>

            <p
            class="mt-1 text-slate-500">

                Serve ready food

            </p>

        </div>

        <a

        href="/waiter/dashboard.html"

        class="rounded-lg bg-slate-700 px-4 py-2 text-white transition hover:bg-slate-800">

            Back

        </a>

    </div>

    <!-- Tabs -->

    <div
    class="mb-5 grid grid-cols-2 overflow-hidden rounded-xl border border-slate-300 bg-white">

        <button

        id="myReadyTab"

        class="bg-emerald-600 px-4 py-3 font-semibold text-white transition">

            My Ready

            <span id="myReadyCount">

                (0)

            </span>

        </button>

        <button

        id="allReadyTab"

        class="bg-white px-4 py-3 font-semibold text-slate-700 transition">

            All Ready

            <span id="allReadyCount">

                (0)

            </span>

        </button>

    </div>

    <!-- Loading -->

    <div

    id="loadingState"

    class="hidden rounded-xl bg-white p-8 text-center shadow">

        <div
        class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-emerald-600 border-t-transparent">

        </div>

        <p
        class="mt-3 text-slate-500">

            Loading ready items...

        </p>

    </div>

    <!-- Empty -->

    <div

    id="emptyState"

    class="hidden rounded-xl bg-white p-10 text-center shadow">

        <div
        class="mb-3 text-5xl">

            🍽️

        </div>

        <h2
        class="text-lg font-semibold">

            No Ready Items

        </h2>

        <p
        class="mt-2 text-slate-500">

            Ready items will appear here.

        </p>

    </div>

    <!-- Cards -->

    <div

    id="readyItemsContainer"

    class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4">
</div>

</div>
<div id="modalContainer"></div>
    
<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/waiterGuard.js"></script>

<script src="/js/align.js"></script>

<script src="/js/order/constants.js"></script>
<script src="/js/order/state.js"></script>
<script src="/js/order/cart.js"></script>

<script>
loadComponent(
    "modalContainer",
    "/components/modal.html"
);
</script>

<script src="/js/modal.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/socket.js"></script>

<script src="/js/ready.js"></script>

</body>

</html>
