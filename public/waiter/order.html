<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Take Order</title>

<link
    rel="stylesheet"
    href="/css/output.css">

</head>

<body class="h-screen overflow-hidden bg-slate-100">

<div class="flex h-full flex-col">

    <!-- Header -->

    <header class="shrink-0 border-b bg-white px-3 py-2 shadow-sm">

    <div class="flex items-center gap-2">

        <a
            href="javascript:history.back()"
            class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-blue-600 text-white">

            ←

        </a>

        <div class="min-w-[70px] text-right">

            <h1
                id="tableTitle"
                class="truncate text-sm font-bold">

                Table

            </h1>

            <p
                id="tableStatus"
                class="text-[11px] text-slate-500">

            </p>

        </div>

    </div>

</header>

    <!-- Categories -->

    <!-- Filters -->
<div class="shrink-0 border-b bg-white">

    <div class="flex flex-col gap-2 px-3 pt-2 pb-2 lg:flex-row lg:items-center">

    <div
    id="foodTypeList"
    class="flex gap-1.5 overflow-x-auto whitespace-nowrap lg:flex-1">
</div>

    <input
    id="menuSearch"
    type="text"
    placeholder="Search..."
    class="h-9 w-full rounded-lg border px-3 text-sm lg:w-56 lg:shrink-0">

</div>

   <div
    id="categoryList"
    class="flex gap-1.5 overflow-x-auto whitespace-nowrap px-3 pt-2 pb-2 lg:hidden">
</div>

</div>

    <!-- Scroll Area -->

<div class="mt-3 flex-1 min-h-0 overflow-hidden">

    <!-- Desktop -->

    <div class="hidden h-full min-h-0 lg:grid lg:grid-cols-[220px_1fr] lg:gap-5">

        <!-- Categories -->

        <div class="mt-1 flex h-full min-h-0 flex-col rounded-xl border bg-white">

            <div class="shrink-0 border-b px-4 py-3 font-semibold">

                Categories

            </div>

            <div
    id="categoryListDesktop"
    class="min-h-0 flex-1 overflow-y-auto overscroll-contain px-3 pb-3 pt-2 space-y-2">

            </div>

        </div>

        <!-- Menu -->

       <div
    id="menuList"
    class="grid auto-rows-max h-full min-h-0 grid-cols-3 gap-3 overflow-y-auto pb-2 xl:grid-cols-4">
        </div>

    </div>

    <!-- Mobile -->

    <div
    id="menuListMobile"
    class="h-full overflow-y-auto grid auto-rows-max grid-cols-1 gap-2 px-2 py-1.5 md:grid-cols-2 lg:hidden">

    </div>

</div>

        Loading...

    </div>

    <!-- Sticky Cart -->

    <div
class="fixed bottom-0 left-0 right-0 z-40 border-t bg-white px-3 py-2 shadow-2xl">

        <div
    class="fixed bottom-0 left-0 right-0 z-40 border-t bg-white px-3 py-2 shadow-2xl">

    <div class="flex items-center justify-between gap-2">

    <div>

        <div
            id="cartItems"
            class="text-sm font-semibold">

            0 Items

        </div>

        <div
            id="cartTotal"
            class="text-xs text-slate-500">

            ₹0

        </div>

    </div>

    <div class="flex gap-2">

        <button
    id="viewCartBtn"
    class="hidden rounded-xl bg-slate-700 px-4 py-2.5 text-sm font-semibold text-white">
            View Order

        </button>

        <button
    id="sendKitchenBtnBottom"
    class="hidden rounded-xl bg-green-600 px-4 py-2.5 text-sm font-semibold text-white">
            Send To Kitchen

        </button>

    </div>

</div>

</div>

    </div>

</div>
<!-- Cart Bottom Sheet -->
<div
    id="cartSheet"
    class="fixed inset-0 z-50 hidden bg-black/40">

    <div
        class="absolute bottom-0 left-0 right-0 max-h-[85vh] overflow-hidden rounded-t-3xl bg-white">

        <div class="flex items-center justify-between border-b px-3 py-2">

            <h2 class="text-lg font-bold">

                Cart

            </h2>

            <button

                onclick="closeCart()"

                class="rounded-lg text-blue-600 transition hover:bg-red-200 hover:text-blue-700 px-3 py-2">

                ✕

            </button>

        </div>
<div class="flex max-h-[75vh] flex-col">

    <div
        class="min-h-0 flex-1 overflow-y-auto">

        <div
            id="currentOrder"
            class="hidden px-3 py-3">
        </div>

    </div>

    <div
        id="orderAction"
        class="hidden shrink-0 border-t bg-white px-3 py-3">
    </div>

</div>
<div id="modalContainer"></div>
    
<script src="/js/components.js"></script>
<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/heartbeat.js"></script>
<script src="/js/waiterGuard.js"></script>

<script src="/js/align.js"></script>

<script src="/js/order/constants.js"></script>
<script src="/js/order/state.js"></script>
<script src="/js/order/cart.js"></script>

<script>
loadComponent(
    "modalContainer",
    "/components/modal.html"
);
</script>

<script src="/js/modal.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/socket.js"></script>
<script src="/js/waiterOrder.js"></script>

</body>

</html>
