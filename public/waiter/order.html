<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Take Order</title>

<link
    rel="stylesheet"
    href="/css/output.css">

</head>

<body class="bg-slate-100">

<div class="flex h-screen flex-col">

    <!-- Header -->

    <header
        class="border-b bg-white p-4 shadow">

        <div
            class="flex items-center justify-between">

            <a
                href="javascript:history.back()"
                class="rounded-lg bg-slate-200 px-3 py-2">

                ←

            </a>

            <div class="text-center">

                <h1
                    id="tableTitle"
                    class="text-xl font-bold">

                    Table

                </h1>

                <p
                    id="tableStatus"
                    class="text-sm text-slate-500">

                </p>

            </div>

            <button
                id="refreshBtn"
                class="rounded-lg bg-blue-600 px-3 py-2 text-white">

                ↻

            </button>

        </div>

    </header>

    <!-- Search -->

    <div class="bg-white p-4">

        <input

            id="menuSearch"

            type="text"

            placeholder="Search menu..."

            class="w-full rounded-xl border p-3">

    </div>

    <!-- Categories -->

    <div
        id="categoryList"
        class="flex gap-2 overflow-x-auto bg-white px-4 pb-3">

    </div>

    <!-- Existing Order -->

    <div
        id="currentOrder"
        class="border-t bg-white p-4">

    </div>

    <!-- Menu -->

    <div
        id="menuList"
        class="flex-1 space-y-3 overflow-y-auto p-4 pb-40">

        Loading...

    </div>

    <!-- Sticky Cart -->

    <div
        class="fixed bottom-0 left-0 right-0 border-t bg-white p-4 shadow-2xl">

        <div
            class="mb-3 flex items-center justify-between">

            <div>

                <div
                    id="cartItems"
                    class="font-semibold">

                    0 Items

                </div>

                <div
                    id="cartTotal"
                    class="text-slate-500">

                    ₹0

                </div>

            </div>

            <button

                id="viewCartBtn"

                class="rounded-lg bg-slate-700 px-5 py-3 text-white">

                View Cart

            </button>

        </div>

        <button

            id="sendKitchenBtn"

            class="w-full rounded-xl bg-green-600 py-4 text-lg font-semibold text-white">

            Send To Kitchen

        </button>

    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/staffAuth.js"></script>

<script src="/js/align.js"></script>

<script src="/js/order/constants.js"></script>
<script src="/js/order/state.js"></script>
<script src="/js/order/cart.js"></script>

<script src="/js/waiterOrder.js"></script>

</body>

</html>
