<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Take Order</title>

<link
    rel="stylesheet"
    href="/css/output.css">

</head>

<body class="h-screen overflow-hidden bg-slate-100">

<div class="flex h-full flex-col">

    <!-- Header -->

    <header class="shrink-0 border-b bg-white px-3 py-2 shadow-sm">

    <div class="flex items-center gap-2">

        <a
            href="javascript:history.back()"
            class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-blue-600 text-white">

            ←

        </a>

        <input
            id="menuSearch"
            type="text"
            placeholder="🔍 Search menu..."
            class="h-9 flex-1 rounded-lg border px-3 text-sm">

        <div class="min-w-[70px] text-right">

            <h1
                id="tableTitle"
                class="truncate text-sm font-bold">

                Table

            </h1>

            <p
                id="tableStatus"
                class="text-[11px] text-slate-500">

            </p>

        </div>

    </div>

</header>

    <!-- Categories -->

    <!-- Filters -->
<div class="shrink-0 border-b bg-white">

    <div
        id="foodTypeList"
        class="flex gap-1.5 overflow-x-auto whitespace-nowrap px-3 pt-2 pb-2">
    </div>

    <div
        id="categoryList"
        class="flex gap-1.5 overflow-x-auto whitespace-nowrap px-3 pt-2 pb-2">
    </div>

</div>

    <!-- Scroll Area -->

<div
class="flex-1 overflow-y-auto pb-28">

    <div
    id="menuList"
    class="grid grid-cols-1 gap-2 px-2 py-1.5 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

        Loading...

    </div>

</div>

        Loading...

    </div>

    <!-- Sticky Cart -->

    <div
class="fixed bottom-0 left-0 right-0 z-40 border-t bg-white px-3 py-2 shadow-2xl">

        <div
    class="fixed bottom-0 left-0 right-0 z-40 border-t bg-white px-3 py-2 shadow-2xl">

    <div class="flex items-center justify-between gap-2">

    <div>

        <div
            id="cartItems"
            class="text-sm font-semibold">

            0 Items

        </div>

        <div
            id="cartTotal"
            class="text-xs text-slate-500">

            ₹0

        </div>

    </div>

    <div class="flex gap-2">

        <button
            id="viewCartBtn"
            class="rounded-xl bg-slate-700 px-4 py-2.5 text-sm font-semibold text-white">

            View Order

        </button>

        <button
            id="sendKitchenBtnBottom"
            class="rounded-xl bg-green-600 px-4 py-2.5 text-sm font-semibold text-white">

            Send To Kitchen

        </button>

    </div>

</div>

</div>

    </div>

</div>
<!-- Cart Bottom Sheet -->
<div
    id="cartSheet"
    class="fixed inset-0 z-50 hidden bg-black/40">

    <div
        class="absolute bottom-0 left-0 right-0 max-h-[85vh] overflow-hidden rounded-t-3xl bg-white">

        <div class="flex items-center justify-between border-b px-3 py-2">

            <h2 class="text-lg font-bold">

                Cart

            </h2>

            <button

                onclick="closeCart()"

                class="rounded-lg text-blue-600 transition hover:bg-red-200 hover:text-blue-700 px-3 py-2">

                ✕

            </button>

        </div>
<div
    class="max-h-[60vh] overflow-y-auto">

    <div
        id="currentOrder"
        class="hidden border-b px-3 py-3">
    </div>
    <div
    id="orderAction"
    class="hidden border-t px-3 py-3">
</div>

    

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/auth.js"></script>

<script src="/js/align.js"></script>

<script src="/js/order/constants.js"></script>
<script src="/js/order/state.js"></script>
<script src="/js/order/cart.js"></script>

<script src="/js/waiterOrder.js"></script>

</body>

</html>
