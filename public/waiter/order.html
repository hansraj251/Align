<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Take Order</title>

<link
    rel="stylesheet"
    href="/css/output.css">

</head>

<body class="h-screen overflow-hidden bg-slate-100">

<div class="flex h-full flex-col">

    <!-- Header -->

    <header
    class="shrink-0 border-b bg-white p-4 shadow">

        <div
            class="flex items-center justify-between">

            <a
                href="javascript:history.back()"
                class="rounded-lg bg-slate-200 px-3 py-2">

                ←

            </a>

            <div class="text-center">

                <h1
                    id="tableTitle"
                    class="text-xl font-bold">

                    Table

                </h1>

                <p
                    id="tableStatus"
                    class="text-sm text-slate-500">

                </p>

            </div>

            <button
                id="refreshBtn"
                class="rounded-lg bg-blue-600 px-3 py-2 text-white">

                ↻

            </button>

        </div>

    </header>

    <!-- Search -->

    <div class="shrink-0 bg-white p-4">

        <input
    id="menuSearch"
    type="text"
    placeholder="Search menu..."
    class="w-full rounded-xl border p-3">

    </div>

    <!-- Categories -->

    <!-- Filters -->
<div class="shrink-0 border-b bg-white">

    <div
        id="foodTypeList"
        class="flex gap-2 overflow-x-auto whitespace-nowrap px-4 pt-3 pb-2">
    </div>

    <div
        id="categoryList"
        class="flex gap-2 overflow-x-auto whitespace-nowrap px-4 pb-3">
    </div>

</div>

    <!-- Scroll Area -->

<div
class="flex-1 overflow-y-auto pb-44">

    <div
        id="currentOrder"
        class="hidden border-b bg-white p-4">
    </div>

    <div
    id="menuList"
    class="grid grid-cols-2 gap-3 p-4 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">

        Loading...

    </div>

</div>

        Loading...

    </div>

    <!-- Sticky Cart -->

    <div
class="fixed bottom-0 left-0 right-0 z-40 border-t bg-white p-4 shadow-2xl">

        <div
    class="fixed bottom-0 left-0 right-0 z-40 border-t bg-white p-4 shadow-2xl">

    <div class="flex items-center justify-between">

        <div>

            <div
                id="cartItems"
                class="font-semibold">

                0 Items

            </div>

            <div
                id="cartTotal"
                class="text-sm text-slate-500">

                ₹0

            </div>

        </div>

        <button

            id="viewCartBtn"

            class="rounded-xl bg-blue-600 px-6 py-3 font-semibold text-white">

            View Cart

        </button>

    </div>

</div>

    </div>

</div>
<!-- Cart Bottom Sheet -->
<div
    id="cartSheet"
    class="fixed inset-0 z-50 hidden bg-black/40">

    <div
        class="absolute bottom-0 left-0 right-0 max-h-[85vh] overflow-hidden rounded-t-3xl bg-white">

        <div class="flex items-center justify-between border-b p-4">

            <h2 class="text-xl font-bold">

                Cart

            </h2>

            <button

                onclick="closeCart()"

                class="rounded-lg bg-slate-200 px-3 py-2">

                ✕

            </button>

        </div>

        <div
    id="cartItemsList"
    class="max-h-[60vh] space-y-3 overflow-y-auto p-4">
</div>

        <div class="border-t p-4">

            <div class="mb-4 flex justify-between text-lg font-bold">

                <span>Total</span>

                <span id="cartSheetTotal">

                    ₹0

                </span>

            </div>

            <button

                id="checkoutBtn"

                class="w-full rounded-xl bg-green-600 py-4 text-lg font-semibold text-white">

                Send To Kitchen

            </button>

        </div>

    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/staffAuth.js"></script>

<script src="/js/align.js"></script>

<script src="/js/order/constants.js"></script>
<script src="/js/order/state.js"></script>
<script src="/js/order/cart.js"></script>

<script src="/js/waiterOrder.js"></script>

</body>

</html>
